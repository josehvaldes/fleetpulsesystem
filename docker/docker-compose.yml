name: redpanda-fleetpulse
networks:
  redpanda_network:
    driver: bridge
volumes:
  redpanda-0: null
services:
  redpanda-0:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-0:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda-0:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda-0:33145
      - --advertise-rpc-addr redpanda-0:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
    networks:
      - redpanda_network
    volumes:
      - redpanda-0:/var/lib/redpanda/data
    ports:
      - 18081:18081
      - 18082:18082
      - 19092:19092
      - 19644:9644

  console:
    image: docker.redpanda.com/redpandadata/console:v3.8.0
    networks:
      - redpanda_network
    ports:
      - 8080:8080
    environment:
      KAFKA_BROKERS: redpanda-0:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda-0:8081
    depends_on:
      - redpanda-0

  emqx:
    image: emqx/emqx-enterprise:latest
    container_name: emqx
    ports:
      - "1883:1883"     # MQTT TCP
      - "8883:8883"     # MQTT SSL
      - "8083:8083"     # MQTT WebSocket
      - "8084:8084"     # MQTT WebSockets SSL
      - "18083:18083"   # EMQX Dashboard Dashboard
    environment:
      - EMQX_NODE__NAME=emqx@redpanda-node
    networks:
      - redpanda_network
    depends_on:
      - redpanda-0